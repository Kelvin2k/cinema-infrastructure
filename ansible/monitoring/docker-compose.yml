# Docker Compose configuration for monitoring stack
# This file defines the services for Prometheus, Grafana, Alertmanager, and various exporters
version: "3.8"

services:
  # Prometheus - Time-series database and monitoring system for collecting and storing metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"  # Web UI and API access port
    volumes:
      # Mount Prometheus configuration file
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      # Mount alert rules for triggering alerts based on metrics
      - ./rules/alert-rules.yml:/etc/prometheus/alert-rules.yml
      # Mount persistent data volume for storing metrics time-series data
      - prometheus_data:/prometheus
    networks:
      - monitoring_network

  # Grafana - Visualization and dashboarding platform for monitoring metrics
  grafana:
    image: grafana/grafana:12.1
    container_name: grafana
    ports:
      - "3000:3000"  # Web UI access port
    volumes:
      # Mount persistent data volume for storing Grafana dashboards and configurations
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring_network

  # Alertmanager - Handles alerts from Prometheus and sends notifications
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"  # Web UI and API access port
    volumes:
      # Mount alertmanager configuration file for notification routing and grouping rules
      - ./rules/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      # Mount persistent data volume for storing alert state and history
      - alertmanager_data:/alertmanager
    networks:
      - monitoring_network

  # Node Exporter - Exports system metrics (CPU, memory, disk, network) from Linux hosts
  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    ports:
      - "9100:9100"  # Metrics export port
    networks:
      - monitoring_network

  # Blackbox Exporter - Probes endpoints and exports metrics for endpoint availability and response times
  blackbox_exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox_exporter
    ports:
      - "9115:9115"  # Metrics export port
    networks:
      - monitoring_network

# Persistent data volumes for storing container data
volumes:
  prometheus_data:  # Stores Prometheus time-series metrics
  alertmanager_data:  # Stores Alertmanager state and history
  grafana_data:  # Stores Grafana dashboards and configurations
  
# Custom Docker network for inter-container communication
networks:
  monitoring_network:
    external: true  # Uses pre-existing external network